<!Doctype HTML>
<html>
    <meta charset="UTF-8">
    <head>
        <title>Binary Convertor</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Binary Code Convertor</h1>
            <p>convert ur text to binary and ur binary to text</p>
            <div class="converter">
                <textarea id="textInput" placeholder="Write text or binary code"></textarea>
                <div class="buttons">
                    <button onclick="TexttoBinary()">Convert to Binary</button>
                    <button onclick="BinarytoText()">Convert to Text</button>
                    
                </div>
                <textarea id="binaryoutput" placeholder="ur result will be here" readonly></textarea>
                <p id="count">characters: 0</p>
                <button class="copy-button" onclick="CopyToClipboard()">Copy It</button>
                <button class="clear-button" onclick="clearbtn()">Clear</button>
            </div>  
        </div>
        <script src="script.js"></script>
        <img src="images/s1.png" class="sticker s1">
        <img src="images/s2.png" class="sticker s2">
</body>
</html>
